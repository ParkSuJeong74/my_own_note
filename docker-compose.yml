x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  # ─────────────────────────────────────────
  # Nginx Proxy Manager - 도메인 라우팅
  # ─────────────────────────────────────────
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.12.3
    container_name: nginx-proxy-manager
    restart: unless-stopped

    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
      - "127.0.0.1:81:81"

    environment:
      TZ: UTC

    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt

    networks:
      - proxy

    security_opt:
      - no-new-privileges:true

    logging: *default-logging

  # ─────────────────────────────────────────
  # File Browser - 개인 파일 서버
  # ─────────────────────────────────────────
  filebrowser:
    image: filebrowser/filebrowser:v2.31.2
    container_name: filebrowser
    restart: unless-stopped

    ports:
      - "127.0.0.1:8081:80"

    environment:
      TZ: UTC

    volumes:
      - /srv/filebrowser/files:/srv
      - /srv/filebrowser/config/database.db:/database.db

    networks:
      - proxy

    mem_limit: 512m
    cpus: 0.5

    security_opt:
      - no-new-privileges:true

    logging: *default-logging

  # ─────────────────────────────────────────
  # MinIO - 프로젝트 공용 S3 호환 오브젝트 스토리지
  # 프로젝트별로 버킷을 분리해서 사용한다.
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped

    command: server /data --console-address ':9001'

    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: UTC

    volumes:
      - minio_data:/data

    networks:
      - proxy

    mem_limit: 1g
    cpus: 1.0

    security_opt:
      - no-new-privileges:true

    logging: *default-logging

  # ─────────────────────────────────────────
  # Cloudflare Tunnel - 외부 공개 진입점
  # ─────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:2025.5.0
    container_name: cloudflared
    restart: unless-stopped

    command: tunnel --protocol http2 --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

    environment:
      TZ: UTC

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - proxy

    mem_limit: 256m
    cpus: 0.5

    security_opt:
      - no-new-privileges:true

    logging: *default-logging

volumes:
  minio_data:
  npm_data:
  npm_letsencrypt:

networks:
  proxy:
    driver: bridge
