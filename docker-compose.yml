x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  # ─────────────────────────────────────────
  # Nginx Proxy Manager - 도메인 라우팅
  # ─────────────────────────────────────────
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.12.3
    container_name: nginx-proxy-manager
    restart: unless-stopped

    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
      - "127.0.0.1:81:81"

    environment:
      TZ: UTC

    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt

    networks:
      - proxy

    security_opt:
      - no-new-privileges:true

    logging: *default-logging

  # ─────────────────────────────────────────
  # File Browser - 개인 파일 서버
  # ─────────────────────────────────────────
  filebrowser:
    image: filebrowser/filebrowser:v2.31.2
    container_name: filebrowser
    restart: unless-stopped

    ports:
      - "127.0.0.1:8081:80"

    environment:
      TZ: UTC

    volumes:
      - /srv/filebrowser/files:/srv
      - /srv/filebrowser/config/database.db:/database.db

    networks:
      - proxy

    mem_limit: 512m
    cpus: 0.5

    security_opt:
      - no-new-privileges:true

    logging: *default-logging

  # ─────────────────────────────────────────
  # MinIO - 프로젝트 공용 S3 호환 오브젝트 스토리지
  # 프로젝트별로 버킷을 분리해서 사용한다.
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped

    command: server /data --console-address ':9001'

    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: UTC

    volumes:
      - minio_data:/data

    networks:
      - proxy

    mem_limit: 1g
    cpus: 1.0

    security_opt:
      - no-new-privileges:true

    logging: *default-logging

  # ─────────────────────────────────────────
  # Cloudflare Tunnel - 외부 공개 진입점
  # ─────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:2025.5.0
    container_name: cloudflared
    restart: unless-stopped

    command: tunnel --protocol http2 --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

    environment:
      TZ: UTC

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - proxy

    mem_limit: 256m
    cpus: 0.5

    security_opt:
      - no-new-privileges:true

    logging: *default-logging

  # ─────────────────────────────────────────
  # Monitoring - Grafana / Loki / Prometheus
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:12.1.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - loki
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: UTC
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - proxy
      - monitoring
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  loki:
    image: grafana/loki:3.7.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  alloy:
    image: grafana/alloy:v1.10.2
    container_name: alloy
    restart: unless-stopped
    command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - loki
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    command:
      - --docker_only=true
      - --housekeeping_interval=15s
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - monitoring
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

volumes:
  minio_data:
  npm_data:
  npm_letsencrypt:
  grafana_data:
  loki_data:
  alloy_data:
  prometheus_data:

networks:
  proxy:
    name: my_own_note_proxy
    driver: bridge
  monitoring:
    name: my_own_note_monitoring
    driver: bridge
